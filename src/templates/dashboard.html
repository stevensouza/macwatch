{% extends "base.html" %}

{% block main %}
    <!-- System Stats Cards -->
    <div class="overview-cards">
        <div class="ov-card">
            <div class="ov-card-header">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                    <rect x="2" y="2" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M6 14V8M10 14V6M14 14v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="ov-card-title">CPU</span>
            </div>
            <div class="ov-card-value" id="ov-cpu-value">--</div>
            <div class="gauge-bar"><div class="gauge-fill gauge-green" id="ov-cpu-bar" style="width:0%"></div></div>
            <div class="ov-card-sub" id="ov-load">Load: --</div>
        </div>
        <div class="ov-card">
            <div class="ov-card-header">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                    <rect x="4" y="2" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M7 12h6M7 9h6M7 6h3" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
                </svg>
                <span class="ov-card-title">Memory</span>
            </div>
            <div class="ov-card-value" id="ov-mem-value">--</div>
            <div class="gauge-bar"><div class="gauge-fill gauge-green" id="ov-mem-bar" style="width:0%"></div></div>
            <div class="ov-card-sub" id="ov-mem-detail">--</div>
        </div>
        <div class="ov-card">
            <div class="ov-card-header">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/>
                    <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1"/>
                    <path d="M10 3v2M10 15v2" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
                </svg>
                <span class="ov-card-title">Disk</span>
            </div>
            <div class="ov-card-value" id="ov-disk-value">--</div>
            <div class="gauge-bar"><div class="gauge-fill gauge-green" id="ov-disk-bar" style="width:0%"></div></div>
            <div class="ov-card-sub" id="ov-disk-detail">--</div>
        </div>
    </div>

    <!-- Top 5 CPU Consumers -->
    <div class="dashboard-section">
        <div class="section-header">
            <h2 class="section-title">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                    <path d="M3 17V7h3v10H3zM8.5 17V3h3v14h-3zM14 17v-7h3v7h-3z"
                          stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Top CPU Consumers
            </h2>
            <a href="/processes" class="view-all-link">View all &rarr;</a>
        </div>
        <div id="ov-top-cpu"></div>
    </div>

    <!-- Top 5 Network Talkers -->
    <div class="dashboard-section">
        <div class="section-header">
            <h2 class="section-title">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M3 10h14M10 3c-2 2-3 4.5-3 7s1 5 3 7c2-2 3-4.5 3-7s-1-5-3-7z" stroke="currentColor" stroke-width="1.3"/>
                </svg>
                Top Network Talkers
            </h2>
            <a href="/network" class="view-all-link">View all &rarr;</a>
        </div>
        <div id="ov-top-network"></div>
    </div>

    <!-- Alert Summary -->
    <div class="dashboard-section">
        <div class="section-header">
            <h2 class="section-title">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M10 2L3 6v5c0 5 3 9.5 7 11 4-1.5 7-6 7-11V6l-7-4z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Alerts
            </h2>
            <a href="/alerts" class="view-all-link">View all &rarr;</a>
        </div>
        <div id="ov-alert-summary"></div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        window.__INITIAL_DATA__ = {{ initial_data | safe }};
        window.__SYSTEM_DATA__ = {{ system_data | safe }};
    </script>
    <script src="/static/js/dashboard.js"></script>
{% endblock %}
