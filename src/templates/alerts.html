{% extends "base.html" %}

{% block title %} — Alerts{% endblock %}

{% block footer %}
    <div class="footer-left">
        <span id="alerts-status" style="color: var(--text-muted)"></span>
    </div>
    <div class="footer-controls">
        <a href="/help" data-tooltip="View documentation, keyboard shortcuts, and FAQ">
            <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.5"/><path d="M7.5 7.5a2.5 2.5 0 014.5 1.5c0 1.5-2 2-2 3.5M10 15.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Help
        </a>
    </div>
{% endblock %}

{% block main %}
    <!-- Loading state -->
    <div id="loading-state" class="analysis-loading">
        <div class="loading-spinner"></div>
        <span>Loading alert data...</span>
    </div>

    <!-- Alert Analysis Section -->
    <div id="alert-analysis" class="analysis-section" style="display:none">
        <div class="analysis-section-header">
            <h2>Alert Analysis</h2>
            <span class="analysis-section-subtitle" id="alert-summary-text"></span>
        </div>

        <!-- Category groups -->
        <div id="alerts-network" class="alert-group" style="display:none">
            <div class="alert-group-header" onclick="toggleAlertGroup('network')">
                <span class="alert-severity-dot" id="alert-dot-network"></span>
                <span class="alert-group-title">Network</span>
                <span class="alert-group-count" id="alert-count-network"></span>
                <span class="toggle-icon" id="toggle-network">
                    <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
            </div>
            <div class="alert-group-body" id="alert-body-network"></div>
        </div>

        <div id="alerts-cpu" class="alert-group" style="display:none">
            <div class="alert-group-header" onclick="toggleAlertGroup('cpu')">
                <span class="alert-severity-dot" id="alert-dot-cpu"></span>
                <span class="alert-group-title">CPU</span>
                <span class="alert-group-count" id="alert-count-cpu"></span>
                <span class="toggle-icon" id="toggle-cpu">
                    <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
            </div>
            <div class="alert-group-body" id="alert-body-cpu"></div>
        </div>

        <div id="alerts-memory" class="alert-group" style="display:none">
            <div class="alert-group-header" onclick="toggleAlertGroup('memory')">
                <span class="alert-severity-dot" id="alert-dot-memory"></span>
                <span class="alert-group-title">Memory</span>
                <span class="alert-group-count" id="alert-count-memory"></span>
                <span class="toggle-icon" id="toggle-memory">
                    <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
            </div>
            <div class="alert-group-body" id="alert-body-memory"></div>
        </div>

        <div id="alerts-disk" class="alert-group" style="display:none">
            <div class="alert-group-header" onclick="toggleAlertGroup('disk')">
                <span class="alert-severity-dot" id="alert-dot-disk"></span>
                <span class="alert-group-title">Disk</span>
                <span class="alert-group-count" id="alert-count-disk"></span>
                <span class="toggle-icon" id="toggle-disk">
                    <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
            </div>
            <div class="alert-group-body" id="alert-body-disk"></div>
        </div>

        <div id="alerts-none" class="alert-all-clear" style="display:none">
            <span class="conn-flag flag-green"></span> All clear — no alerts detected
        </div>
    </div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/alerts.js"></script>
{% endblock %}
