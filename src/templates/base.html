<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacWatch{% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Ambient background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <header>
        <div class="header-brand">
            <div class="brand-icon" id="activity-pulse">
                <svg viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    <circle cx="16" cy="16" r="8" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="16" cy="16" r="3" fill="currentColor" class="pulse-dot"/>
                    <path d="M2 16 H8 L11 10 L14 22 L17 8 L20 20 L23 14 H30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="pulse-line"/>
                </svg>
            </div>
            <div>
                <h1>MacWatch</h1>
                <span class="subtitle">System Health Dashboard</span>
            </div>
        </div>
        <nav class="header-tabs">
            <a href="/" class="header-tab {% if active_tab == 'dashboard' %}active{% endif %}" data-tooltip="System overview with CPU, memory, disk, and highlights from all tabs">
                <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
                Dashboard
            </a>
            <a href="/processes" class="header-tab {% if active_tab == 'processes' %}active{% endif %}" data-tooltip="All system processes sorted by CPU and memory usage">
                <svg viewBox="0 0 20 20" fill="none">
                    <path d="M3 17V7h3v10H3zM8.5 17V3h3v14h-3zM14 17v-7h3v7h-3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Processes
            </a>
            <a href="/network" class="header-tab {% if active_tab == 'network' %}active{% endif %}" data-tooltip="Network connections, traffic stats, and threat scores for all apps">
                <svg viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M3 10h14M10 3c-2 2-3 4.5-3 7s1 5 3 7c2-2 3-4.5 3-7s-1-5-3-7z" stroke="currentColor" stroke-width="1.3"/>
                </svg>
                Network
            </a>
            <a href="/alerts" class="header-tab {% if active_tab == 'alerts' %}active{% endif %}" id="alerts-tab" data-tooltip="Security alerts grouped by severity with educational explanations">
                <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v5c0 5 3 9.5 7 11 4-1.5 7-6 7-11V6l-7-4z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Alerts
                <span class="tab-alert-badge" id="tab-alert-badge" style="display:none"></span>
            </a>
            <a href="/analysis" class="header-tab {% if active_tab == 'analysis' %}active{% endif %}" data-tooltip="On-demand AI-powered assessment of security, performance, and system health">
                <svg viewBox="0 0 20 20" fill="none">
                    <path d="M10 2l1.5 3.5L15 7l-3.5 1.5L10 12l-1.5-3.5L5 7l3.5-1.5L10 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M15 12l1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2z" stroke="currentColor" stroke-width="1" stroke-linejoin="round" opacity="0.5"/>
                </svg>
                AI Analysis
            </a>
        </nav>
        {% block header_controls %}{% endblock %}
    </header>

    <main>
        {% block main %}{% endblock %}
    </main>

    <footer>
        {% block footer %}
        <div class="footer-left">
            <div class="refresh-indicator" id="refresh-indicator"></div>
            <span id="last-refresh">Waiting for data...</span>
        </div>
        <div class="footer-controls">
            <label class="footer-label" data-tooltip="How often the page fetches fresh data. Slower = less screen redraw.">Refresh:
                <select id="refresh-interval">
                    <option value="30000">30s</option>
                    <option value="60000">1m</option>
                    <option value="120000" selected>2m</option>
                    <option value="180000">3m</option>
                    <option value="240000">4m</option>
                    <option value="300000">5m</option>
                    <option value="600000">10m</option>
                    <option value="0">Manual</option>
                </select>
            </label>
            <button id="pause-btn" onclick="togglePause()" data-tooltip="Pause or resume automatic data refresh">
                <svg viewBox="0 0 20 20" fill="none" width="14" height="14" id="pause-icon"><rect x="5" y="4" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="11.5" y="4" width="3.5" height="12" rx="1" fill="currentColor"/></svg>
                <span id="pause-label">Pause</span>
            </button>
            <button onclick="refresh()" data-tooltip="Fetch fresh data now">
                <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M3 10a7 7 0 0113.6-2.3M17 10a7 7 0 01-13.6 2.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 3v5h-5M3 17v-5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Refresh
            </button>
            <a href="/help" data-tooltip="View documentation, keyboard shortcuts, and FAQ">
                <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.5"/><path d="M7.5 7.5a2.5 2.5 0 014.5 1.5c0 1.5-2 2-2 3.5M10 15.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Help
            </a>
        </div>
        {% endblock %}
    </footer>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="/static/js/shared.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
